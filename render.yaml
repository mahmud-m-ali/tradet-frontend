services:
  - type: web
    name: halalet-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/halalet.db
      - key: PYTHON_VERSION
        value: 3.13.0
    healthCheckPath: /api/health
